<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h2>Student Portal</h2>

        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Courses</a></li>
                <li><a href="#">Profile</a></li>
                <li><a href="#">Grades</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section id="hero">
            <h1>Welcome to the Student Portal</h1>

            <p>
                Manage your courses, grades and profile efficiently.
            </p>

            <button>
                Explore Courses
            </button>
        </section>

        <section id="stats">

            <div class="stat-item">
                <h3>3</h3>
                <p>Courses Enrolled</p>
            </div>

            <div class="stat-item">
                <h3>8.8</h3>
                <p>GPA</p>
            </div>

            <div class="stat-item">
                <h3>6</h3>
                <p>Semester</p>
            </div>

        </section>

        <section id="courses">

            <h2>Available Courses</h2>

            <input type="text" id="search-courses" placeholder="Search courses...">

            <button id="sort-btn">
                Sort by Credits
            </button>

            <div id="selected-course">
                Select a course to view details
            </div>

            <div class="course-grid"></div>

            <p id="total-credits"></p>

        </section>

    </main>

    <footer>
        <p>© 2026 Student Portal</p>
    </footer>

    <script type="module" src="app.js"></script>

</body>

</html>
